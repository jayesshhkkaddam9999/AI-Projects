# ═══════════════════════════════════════════════════════════════
# ✅ OpenAI Configuration — just paste your API key below!
# No GCP, no CLI, no project ID needed.
# ═══════════════════════════════════════════════════════════════

# Get your key from: https://platform.openai.com/api-keys
spring.ai.openai.api-key=sk-YOUR_OPENAI_API_KEY_HERE

# Model to use
# gpt-4o-mini → cheapest, very fast, great for learning (~$0.00015 per question)
# gpt-4o      → smarter, slightly more expensive
spring.ai.openai.chat.options.model=gpt-4o-mini

# ═══════════════════════════════════════════════════════════════
# Model Tuning
# ═══════════════════════════════════════════════════════════════

# 0.0 = very focused/deterministic, 1.0 = very creative
spring.ai.openai.chat.options.temperature=0.7

# Max tokens in response (~750 words)
spring.ai.openai.chat.options.max-tokens=1024

# ═══════════════════════════════════════════════════════════════
# App Config
# ═══════════════════════════════════════════════════════════════
spring.application.name=day3-spring-ai-openai
server.port=8080

# Pretty print JSON responses in Postman
spring.jackson.serialization.indent-output=true
spring.jackson.serialization.write-dates-as-timestamps=false
